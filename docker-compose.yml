services:
  backend:
    build: ./backend
    container_name: movielibrary-backend
    ports:
      - "8080:8080"
    environment:
      - APP_PROFILE=test
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_BACKEND_URL: http://localhost:8080
    container_name: movielibrary-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
